<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Agente de Licitaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:12px;padding:20px 24px;margin-bottom:20px;color:white;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:800}
.header p{font-size:12px;opacity:.8;margin-top:3px}
.source-badges{display:flex;gap:8px;flex-wrap:wrap}
.sbadge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:white;color:#475569;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:all .15s}
.tab.active{background:#2563eb;color:white}
.card{background:white;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
label{font-size:13px;font-weight:600;color:#64748b;display:block;margin-bottom:6px}
input,select{width:100%;padding:11px 14px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;outline:none;transition:border .15s;background:white}
input:focus,select:focus{border-color:#2563eb}
.hint{font-size:12px;color:#94a3b8;margin-top:6px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600}
.chip:hover{background:#dbeafe}
.fuentes-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.fbox{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;border:2px solid #e2e8f0;background:white;color:#94a3b8;transition:all .15s}
.fbox.on-mp{border-color:#2563eb;background:#dbeafe;color:#1d4ed8}
.fbox.on-do{border-color:#c2410c;background:#ffedd5;color:#c2410c}
.btns{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn-primary{background:#2563eb;color:white;border:none;padding:12px 32px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-primary:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed}
.btn-cancel{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-reset{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.steps{margin-top:16px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;padding:14px;display:none}
.step{font-size:13px;margin-bottom:4px;display:flex;gap:6px;align-items:center}
.err{margin-top:14px;font-size:13px;color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:8px;display:none}
.summary{background:white;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:13px;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;gap:20px;flex-wrap:wrap}
.rcard{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.rcard.mp{border-left:4px solid #2563eb}
.rcard.do{border-left:4px solid #ea580c}
.rtitle{font-weight:700;font-size:14px;line-height:1.4;margin-bottom:8px}
.rmeta{font-size:12px;color:#64748b;display:flex;flex-wrap:wrap;gap:4px 14px;margin-bottom:12px}
.rbtns{display:flex;gap:8px;flex-wrap:wrap}
.btn-ai{color:white;border:none;padding:7px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.btn-ai.mp{background:#2563eb}
.btn-ai.do{background:#ea580c}
.btn-link{background:#f1f5f9;color:#2563eb;border:1px solid #e2e8f0;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
.bg{background:#dcfce7;color:#15803d}
.br{background:#fee2e2;color:#dc2626}
.bb{background:#dbeafe;color:#1d4ed8}
.bgr{background:#f1f5f9;color:#64748b}
.bor{background:#ffedd5;color:#c2410c}
.analysis{font-size:13px;line-height:1.9;white-space:pre-wrap;color:#334155}
.empty{text-align:center;color:#94a3b8;padding:48px}
.hcard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:8px}
.region-tag{background:#f0fdf4;color:#15803d;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>🔍 Agente de Licitaciones</h1>
      <p>Ingeniería Vial · Mercado Público + Diario Oficial · Chile</p>
    </div>
    <div class="source-badges">
      <span class="sbadge" style="background:#dbeafe;color:#1d4ed8">🏛 Mercado Público</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('buscar',this)">🔎 Buscar</button>
    <button class="tab" id="tb-res" onclick="goTab('resultados',this)">📋 Resultados (0)</button>
    <button class="tab" onclick="goTab('detalle',this)">📄 Análisis IA</button>
    <button class="tab" id="tb-hist" onclick="goTab('historial',this)">🕐 Historial (0)</button>
  </div>

  <!-- BUSCAR -->
  <div id="pane-buscar">
    <div class="card">
      <div style="font-weight:700;font-size:15px;margin-bottom:16px">⚙️ Configurar búsqueda</div>

      <div class="grid2">
        <div>
          <label>Palabras clave</label>
          <input id="kw" value="vial" placeholder="Ej: infraestructura vial" onkeydown="if(event.key==='Enter')buscar()"/>
        </div>
        <div>
          <label>Filtrar por región (Mercado Público)</label>
          <select id="region">
            <option value="todas">🌎 Todas las regiones</option>
            <option value="7">Región del Maule</option>
            <option value="16">Región de Ñuble</option>
            <option value="8">Región del Biobío</option>
            <option value="9">Región de La Araucanía</option>
            <option value="14">Región de Los Ríos</option>
            <option value="10">Región de Los Lagos</option>
            <option value="11">Región de Aysén</option>
            <option value="12">Región de Magallanes</option>
          </select>
        </div>
      </div>

      <div class="hint">💡 Selecciona una o más fuentes y el rango de regiones que te interesa.</div>

      <div class="chips" id="chips"></div>

      <div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:10px">Fuentes:</div>
      <div class="fuentes-row">
        <button id="fmp" class="fbox on-mp" onclick="toggleFuente('mp')">🏛 Mercado Público</button>
      </div>

      <div class="btns">
        <button class="btn-primary" id="btn-b" onclick="buscar()">🚀 Buscar Licitaciones</button>
        <button class="btn-cancel" id="btn-c" style="display:none" onclick="cancelar()">⛔ Cancelar</button>
        <button class="btn-reset" id="btn-r" style="display:none" onclick="reiniciar()">🔄 Reiniciar</button>
      </div>
      <div class="steps" id="steps"></div>
      <div class="err" id="err"></div>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div id="pane-resultados" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="list"></div>
  </div>

  <!-- DETALLE -->
  <div id="pane-detalle" style="display:none">
    <div class="card" id="detalle"><div class="empty">Selecciona una licitación desde Resultados.</div></div>
  </div>

  <!-- HISTORIAL -->
  <div id="pane-historial" style="display:none">
    <div class="card" id="hist-list"><div class="empty">Sin historial aún.</div></div>
  </div>
</div>

<script>
const SK = "lic_unif_v1";
const CHIPS = ["vial","infraestructura vial","estudio vial","prefactibilidad","diseño vial","concesionaria","MOP"];
let results=[], history=[], loading=false, ctrl=null;
let fuentes = { mp: true, do: true };

// Init chips
const ce = document.getElementById("chips");
CHIPS.forEach(s => {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = s;
  b.onclick = () => document.getElementById("kw").value = s;
  ce.appendChild(b);
});

// Load history
try { history = JSON.parse(localStorage.getItem(SK)||"[]"); renderHist(); } catch {}

function toggleFuente(f) {
  fuentes[f] = !fuentes[f];
  const btn = document.getElementById("f"+f);
  if(f==="mp") btn.className = "fbox" + (fuentes.mp ? " on-mp" : "");
  if(f==="do") btn.className = "fbox" + (fuentes.do ? " on-do" : "");
}

function goTab(name, btn) {
  ["buscar","resultados","detalle","historial"].forEach(t => document.getElementById("pane-"+t).style.display="none");
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.getElementById("pane-"+name).style.display = "block";
  if(btn) btn.classList.add("active");
}

function setLoad(v) {
  loading = v;
  const b = document.getElementById("btn-b");
  b.disabled = v; b.textContent = v ? "⏳ Buscando..." : "🚀 Buscar Licitaciones";
  document.getElementById("btn-c").style.display = v ? "inline-block" : "none";
  document.getElementById("btn-r").style.display = v ? "inline-block" : "none";
}

function addStep(msg, cls) {
  const el = document.getElementById("steps"); el.style.display = "block";
  const d = document.createElement("div"); d.className = "step";
  d.style.color = cls==="ok" ? "#16a34a" : cls==="wait" ? "#2563eb" : "#94a3b8";
  d.innerHTML = `<span>${cls==="ok"?"✅":cls==="wait"?"⏳":"⚪"}</span><span>${msg}</span>`;
  el.appendChild(d);
}

function showErr(msg) {
  const e = document.getElementById("err");
  e.style.display = msg ? "block" : "none"; e.textContent = msg;
}

function cancelar() {
  if(ctrl) ctrl.abort(); ctrl = null;
  setLoad(false);
  document.getElementById("steps").innerHTML = "";
  document.getElementById("steps").style.display = "none";
  showErr("");
}

function reiniciar() {
  cancelar(); results = [];
  renderResults();
  goTab("buscar", document.querySelector(".tab"));
}

async function buscar() {
  const kw = document.getElementById("kw").value.trim();
  const region = document.getElementById("region").value;
  if(!kw || loading) return;
  if(!fuentes.mp && !fuentes.do) { showErr("Selecciona al menos una fuente."); return; }

  ctrl = new AbortController();
  setLoad(true); showErr("");
  document.getElementById("steps").innerHTML = "";
  results = [];

  try {
    // Diario Oficial
    if(fuentes.do) {
      addStep("Buscando en Diario Oficial...", "wait");
      const doResults = await searchDiarioOficial(kw, ctrl.signal);
      if(doResults.length) {
        results.push(...doResults);
        addStep(`✅ ${doResults.length} licitaciones en Diario Oficial`, "ok");
      } else {
        addStep("Sin resultados en Diario Oficial", "empty");
      }
    }

    if(results.length) {
      saveHist(results);
      renderResults();
      goTab("resultados", document.querySelectorAll(".tab")[1]);
    } else {
      showErr("No se encontraron licitaciones. Prueba con otro término.");
    }

  } catch(e) {
    if(e.name==="AbortError") showErr("Búsqueda cancelada.");
    else showErr("Error: " + e.message);
  }
  setLoad(false);
}

async function searchDiarioOficial(kw, signal) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", signal,
    headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: `Eres un agente que busca licitaciones en el Diario Oficial de Chile.
Responde ÚNICAMENTE con un array JSON. Sin texto, sin markdown.
Schema: {"titulo":"","organismo":"","estado":"Publicada","fechaPublicacion":"","fechaCierre":"","monto":null,"descripcion":"","url":"","fuente":"Diario Oficial","region":""}`,
      messages:[{role:"user",content:`Busca licitaciones en el Diario Oficial de Chile relacionadas con: "${kw}".

Ejecuta estas búsquedas en orden:
1. site:diariooficial.interior.gob.cl "${kw}" licitacion
2. site:diariooficial.interior.gob.cl "${kw}" concurso publico
3. diario oficial chile licitacion "${kw}" ingenieria vial 2026

Extrae todos los resultados reales que encuentres con título, organismo, fecha y URL. Devuelve array JSON.`}],
      tools:[{type:"web_search_20250305",name:"web_search"}]
    })
  });
  if(!res.ok) return [];
  const data = await res.json();
  const text = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"";
  try {
    const clean = text.replace(/```json|```/g,"").trim();
    const match = clean.match(/\[[\s\S]*\]/);
    return match ? JSON.parse(match[0]) : [];
  } catch { return []; }
}

function badge(e) {
  const l=(e||"").toLowerCase();
  if(l.includes("publicada")||l.includes("activa")) return `<span class="badge bg">${e}</span>`;
  if(l.includes("cerrada")||l.includes("adjudicada")) return `<span class="badge bgr">${e}</span>`;
  if(l.includes("desierta")||l.includes("revocada")) return `<span class="badge br">${e}</span>`;
  return `<span class="badge bb">${e||"–"}</span>`;
}

function fuenteBadge(f) {
  return f==="Mercado Público"
    ? `<span class="badge bb">🏛 Mercado Público</span>`
    : `<span class="badge bor">📰 Diario Oficial</span>`;
}

function renderResults() {
  const mpC = results.filter(r=>r.fuente==="Mercado Público").length;
  const doC = results.filter(r=>r.fuente==="Diario Oficial").length;
  document.getElementById("tb-res").textContent = `📋 Resultados (${results.length})`;
  const sum = document.getElementById("summary");
  sum.innerHTML = `
    <span>Total: <b>${results.length}</b></span>
    ${mpC>0?`<span>🏛 Mercado Público: <b style="color:#1d4ed8">${mpC}</b></span>`:""}
    ${doC>0?`<span>📰 Diario Oficial: <b style="color:#c2410c">${doC}</b></span>`:""}
  `;
  const el = document.getElementById("list");
  if(!results.length){el.innerHTML='<div class="empty">Sin resultados.</div>';return;}
  el.innerHTML = results.map((r,i)=>{
    const isMP = r.fuente==="Mercado Público";
    return `
    <div class="rcard ${isMP?"mp":"do"}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <div class="rtitle" style="flex:1;min-width:180px">${r.titulo}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0">
          ${fuenteBadge(r.fuente)} ${badge(r.estado)}
        </div>
      </div>
      <div class="rmeta">
        <span>🏛️ ${r.organismo||"–"}</span>
        ${r.codigo?`<span>🔖 ${r.codigo}</span>`:""}
        ${r.region && r.region!=="undefined"?`<span class="region-tag">📍 ${r.region}</span>`:""}
        <span>⏰ Cierre: ${r.fechaCierre||"–"}</span>
        ${r.monto?`<span style="color:#059669;font-weight:600">💰 ${r.monto}</span>`:""}
      </div>
      ${r.descripcion?`<div style="font-size:12px;color:#64748b;margin-bottom:10px;font-style:italic">${r.descripcion.substring(0,200)}${r.descripcion.length>200?"…":""}</div>`:""}
      <div class="rbtns">
        <button class="btn-ai ${isMP?"mp":"do"}" onclick="verDetalle(${i})">🤖 Analizar con IA</button>
        ${r.url?`<a href="${r.url}" target="_blank" class="btn-link">🔗 Ver fuente</a>`:""}
      </div>
    </div>`;
  }).join("");
}

async function verDetalle(i) {
  const item = results[i];
  const isMP = item.fuente === "Mercado Público";
  goTab("detalle", document.querySelectorAll(".tab")[2]);
  document.getElementById("detalle").innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      ${fuenteBadge(item.fuente)} ${badge(item.estado)}
      ${item.region?`<span class="region-tag">📍 ${item.region}</span>`:""}
    </div>
    <div style="font-weight:700;font-size:17px;margin-bottom:6px;line-height:1.3">${item.titulo}</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap">
      <span>🏛️ ${item.organismo||"–"}</span>
      ${item.codigo?`<span>🔖 ${item.codigo}</span>`:""}
      <span>⏰ Cierre: ${item.fechaCierre||"–"}</span>
      ${item.monto?`<span style="color:#059669;font-weight:600">💰 ${item.monto}</span>`:""}
    </div>
    <hr style="border:none;border-top:1px solid #f1f5f9;margin-bottom:16px"/>
    <div id="ai" style="color:${isMP?"#2563eb":"#ea580c"};font-size:14px;padding:20px 0">⏳ Analizando con IA...</div>
    ${item.url?`<div style="margin-top:20px"><a href="${item.url}" target="_blank" class="btn-link">🔗 Abrir fuente original</a></div>`:""}`;

  try {
    const res = await fetch("/claude", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        system:"Eres experto en licitaciones públicas chilenas de ingeniería vial. Analiza de forma concisa y práctica.",
        messages:[{role:"user",content:`Analiza esta licitación de ${item.fuente} para una empresa de ingeniería vial:\n\nTítulo: ${item.titulo}\nOrganismo: ${item.organismo}\nRegión: ${item.region||"No especificada"}\nEstado: ${item.estado}\nCierre: ${item.fechaCierre}\nMonto: ${item.monto||"No especificado"}\n${item.codigo?`Código: ${item.codigo}`:""}\n\n**1. Objeto** (2-3 líneas)\n**2. Relevancia** Alta/Media/Baja\n**3. Plazos clave**\n**4. Recomendación** ¿Postular?`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"Sin análisis.";
    const ai = document.getElementById("ai");
    ai.className = "analysis"; ai.textContent = txt;
  } catch(e) {
    document.getElementById("ai").textContent = "Error al analizar: " + e.message;
  }
}

function saveHist(items) {
  const m = [...items.map(i=>({...i,_at:new Date().toLocaleDateString("es-CL")})),...history].slice(0,100);
  history = m;
  try{localStorage.setItem(SK,JSON.stringify(history));}catch{}
  renderHist();
}

function renderHist() {
  document.getElementById("tb-hist").textContent = `🕐 Historial (${history.length})`;
  const el = document.getElementById("hist-list");
  if(!history.length){el.innerHTML='<div class="empty">Sin historial aún.</div>';return;}
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;color:#64748b">${history.length} licitaciones guardadas</span>
      <button onclick="clearHist()" style="background:#fee2e2;color:#dc2626;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600">🗑️ Limpiar</button>
    </div>
    ${history.map(r=>`
      <div class="hcard">
        <div style="display:flex;gap:6px;margin-bottom:4px">${fuenteBadge(r.fuente)}${r.region?`<span class="region-tag">📍 ${r.region}</span>`:""}</div>
        <div style="font-weight:600;font-size:13px">${r.titulo}</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:3px">${r.organismo||"–"} · Cierre: ${r.fechaCierre||"–"} · ${r._at}</div>
      </div>`).join("")}`;
}

function clearHist() {
  history = [];
  try{localStorage.removeItem(SK);}catch{}
  renderHist();
}
</script>
</body>
</html>
